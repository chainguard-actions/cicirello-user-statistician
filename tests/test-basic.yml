name: Test basic usage
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    env:
      GITHUB_TOKEN: dummy-token-for-testing
      GH_TOKEN: dummy-token-for-testing
      GITHUB_REPOSITORY_OWNER: testowner
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - id: action
        uses: .
        with:
          image-file: images/userstats.svg
          commit-and-push: "false"
          fail-on-error: "false"
      - name: Assert exit-code output is present
        env:
          EXIT_CODE: ${{ steps.action.outputs.exit-code }}
        run: |
          echo "exit-code: $EXIT_CODE"
          if [ -z "$EXIT_CODE" ]; then
            echo "FAIL: exit-code output was empty"
            exit 1
          fi
          echo "PASS: exit-code output is '$EXIT_CODE'"
